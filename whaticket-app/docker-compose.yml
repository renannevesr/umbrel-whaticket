version: "3.7"

services:
  # Proxy padrão do Umbrel: protege o app com a senha do Umbrel e roteia para o frontend
  app_proxy:
    environment:
      APP_HOST: whaticket-app_frontend_1
      APP_PORT: 80

  # Banco de dados
  db:
    image: mariadb:10.6
    restart: on-failure
    stop_grace_period: 1m
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_bin
    environment:
      MYSQL_ROOT_PASSWORD: whaticketrootpass
      MYSQL_DATABASE: whaticket
      MYSQL_USER: whaticket
      MYSQL_PASSWORD: whaticketpass
      TZ: America/Fortaleza
    volumes:
      - ${APP_DATA_DIR}/data/mysql:/var/lib/mysql

  # Backend (Node 14 + puppeteer / whatsapp-web.js)
  # Sobrescrevemos o CMD do Dockerfile para esperar o banco, rodar migrations
  # E seeds (cria o usuário admin) e só então iniciar o servidor.
  backend:
    restart: on-failure
    stop_grace_period: 1m
    depends_on:
      - db
    build:
      context: https://github.com/canove/whaticket-community.git#master:backend
      dockerfile: Dockerfile
    command: >-
      dockerize -wait tcp://db:3306 -timeout 300s
      sh -c "npx sequelize db:migrate && npx sequelize db:seed:all || true; node dist/server.js"
    environment:
      NODE_ENV: production
      # IMPORTANTE: troque CHANGE_ME_UMBREL_IP pelo IP local do seu Umbrel Home (ex: 192.168.0.50)
      BACKEND_URL: http://CHANGE_ME_UMBREL_IP:3001
      FRONTEND_URL: http://CHANGE_ME_UMBREL_IP:3000
      PROXY_PORT: 3001
      PORT: 3000
      DB_HOST: db
      DB_DIALECT: mysql
      DB_USER: whaticket
      DB_PASS: whaticketpass
      DB_NAME: whaticket
      JWT_SECRET: troque_este_segredo_aleatorio_1
      JWT_REFRESH_SECRET: troque_este_segredo_aleatorio_2
    volumes:
      - ${APP_DATA_DIR}/data/backend/public:/usr/src/app/public
      - ${APP_DATA_DIR}/data/backend/sessions:/usr/src/app/.wwebjs_auth
    ports:
      - "3001:3000"

  # Frontend (React servido por nginx na porta 80)
  frontend:
    restart: on-failure
    stop_grace_period: 1m
    depends_on:
      - backend
    build:
      context: https://github.com/canove/whaticket-community.git#master:frontend
      dockerfile: Dockerfile
    environment:
      # IMPORTANTE: mesmo IP do seu Umbrel Home
      REACT_APP_BACKEND_URL: http://CHANGE_ME_UMBREL_IP:3001
    ports:
      - "3000:80"
