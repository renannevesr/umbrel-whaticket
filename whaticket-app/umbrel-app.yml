manifestVersion: 1
id: whaticket-app
category: social
name: WhaTicket
version: "1.0.0"
tagline: Sistema de atendimento multiusuário baseado no WhatsApp
description: >-
  WhaTicket é um sistema de tickets baseado em mensagens do WhatsApp que
  permite múltiplos usuários atenderem o mesmo número.


  Cada nova mensagem recebida cria um ticket numa fila; atendentes podem
  aceitar, responder e resolver. Suporta múltiplas conexões de WhatsApp e
  envio/recebimento de mídia (imagens, áudios, documentos).


  ATENÇÃO: projeto da comunidade (whaticket-community). O WhatsApp não permite
  oficialmente clientes não oficiais, então há risco de bloqueio do número.
  Login padrão: admin@whaticket.com / admin
releaseNotes: >-
  Primeira versão empacotada para Umbrel a partir de canove/whaticket-community.
developer: canove
website: https://github.com/canove/whaticket-community
dependencies: []
repo: https://github.com/renannevesr/umbrel-whaticket
support: https://github.com/canove/whaticket-community/issues
port: 3000
